<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" width="60" height="60">
  <defs>
    <style>
      .logo-skin { fill: #ddb892; }
      .logo-brown { fill: #8b6f47; }
      .logo-gold { fill: #d4853a; }
      .logo-wheat { fill: #c9a961; }
    </style>
  </defs>

  <!-- Mother's Head -->
  <circle cx="18" cy="12" r="6" class="logo-skin"/>

  <!-- Mother's Hair -->
  <path d="M 12 12 Q 12 6 18 6 Q 24 6 24 12" class="logo-brown"/>

  <!-- Child's Head -->
  <circle cx="35" cy="18" r="4" class="logo-skin"/>

  <!-- Child's Hair -->
  <path d="M 31 18 Q 31 14 35 14 Q 39 14 39 18" class="logo-brown"/>

  <!-- Mother's Body -->
  <rect x="12" y="18" width="12" height="14" rx="2" class="logo-skin"/>

  <!-- Child's Body -->
  <rect x="31" y="22" width="8" height="10" rx="2" class="logo-skin"/>

  <!-- Mother's Arm -->
  <path d="M 24 20 L 28 18" stroke="#8b6f47" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <circle cx="28" cy="18" r="1" class="logo-skin"/>

  <!-- Child's Arm -->
  <path d="M 39 24 L 42 23" stroke="#8b6f47" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <circle cx="42" cy="23" r="0.8" class="logo-skin"/>

  <!-- Mother holding Child -->
  <path d="M 24 22 L 31 22" stroke="#d4853a" stroke-width="1" opacity="0.6" fill="none"/>

  <!-- Wheat stalks on left -->
  <g class="logo-wheat">
    <path d="M 8 30 Q 6 35 8 40" stroke="#c9a961" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M 8 32 L 5 34" stroke="#c9a961" stroke-width="1" fill="none"/>
    <path d="M 8 35 L 5 37" stroke="#c9a961" stroke-width="1" fill="none"/>
    <path d="M 8 38 L 5 40" stroke="#c9a961" stroke-width="1" fill="none"/>
  </g>

  <!-- Wheat stalks on right -->
  <g class="logo-wheat">
    <path d="M 52 30 Q 54 35 52 40" stroke="#c9a961" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M 52 32 L 55 34" stroke="#c9a961" stroke-width="1" fill="none"/>
    <path d="M 52 35 L 55 37" stroke="#c9a961" stroke-width="1" fill="none"/>
    <path d="M 52 38 L 55 40" stroke="#c9a961" stroke-width="1" fill="none"/>
  </g>

  <!-- Decorative star -->
  <g class="logo-gold">
    <polygon points="30,50 33,58 41,58 35,63 38,71 30,66 22,71 25,63 19,58 27,58"/>
  </g>

  <!-- Heart shape (care/love) -->
  <g class="logo-gold" opacity="0.7">
    <path d="M 30 25 C 30 25 28 23 26 23 C 24 23 23 25 23 27 C 23 30 26 33 30 35 C 34 33 37 30 37 27 C 37 25 36 23 34 23 C 32 23 30 25 30 25Z" fill="#d4853a"/>
  </g>

  <!-- Text could be added below in HTML -->
</svg>
